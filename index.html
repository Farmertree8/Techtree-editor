<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tech Tree Editor</title>

<style>

body{
font-family:sans-serif;
margin:0;
overflow:auto;
}

#toolbar{
background:#eee;
padding:6px;
height:36px;
display:flex;
gap:6px;
align-items:center;
}

#canvas{
position:relative;
width:4000px;
height:3000px;
background:#fafafa;
}

.node{
position:absolute;
width:140px;
padding:6px;
border-radius:6px;
border:1px solid #333;
cursor:move;
}

.node-title{
font-weight:bold;
cursor:text;
}

svg{
position:absolute;
width:4000px;
height:3000px;
pointer-events:none;
}

line{
stroke:black;
stroke-width:2;
pointer-events:auto;
cursor:pointer;
}

</style>
</head>

<body>

<div id="toolbar">

<button onclick="autoArrange()">自動排列</button>

<button onclick="addTech()">新增科技</button>

<button onclick="addCategory()">新增類別</button>

<button onclick="addEvent()">新增Event</button>

<button onclick="exportJSON()">匯出</button>

<button onclick="importJSON()">匯入</button>

</div>

<div id="canvas">

<svg id="links"></svg>

</div>

<script>

let techs={}
let links=[]
let categories={general:"#cccccc"}
let events=[]
let selectedNodes = new Set()

let selected=null

const canvas=document.getElementById("canvas")
const svg=document.getElementById("links")

function addTech(){

let id="tech_"+Date.now()

let tech={
id:id,
name:"new tech",
tier:1,
category:"general",
events:[],
x:200,
y:200
}

techs[id]=tech

createNode(tech)

}

function addCategory(){

let name=prompt("category name")

if(!name)return

let color=prompt("color (#hex)","#a0a0ff")

categories[name]=color

updateAllNodes()

}

function addEvent(){

let name=prompt("event name")

if(!name)return

events.push(name)

updateAllNodes()

}

function createNode(tech){

let div=document.createElement("div")
div.className="node"
div.dataset.id=tech.id

canvas.appendChild(div)

renderNode(div,tech)

dragElement(div)

div.onclick=(e)=>{

if(e.ctrlKey){

if(selectedNodes.has(tech.id)){
selectedNodes.delete(tech.id)
div.style.outline=""
}else{
selectedNodes.add(tech.id)
div.style.outline="3px solid red"
}

return

}

if(e.shiftKey){

if(selected==null){
selected=tech.id
}else{
toggleLink(selected,tech.id)
selected=null
}

}

}

div.oncontextmenu=(e)=>{

e.preventDefault()

let targets=[tech.id]

if(selectedNodes.size>0){
targets=[...selectedNodes]
}

if(!confirm("Delete "+targets.length+" tech(s)?")) return

targets.forEach(id=>{

delete techs[id]

links=links.filter(l=>l.from!=id && l.to!=id)

let el=document.querySelector(`[data-id="${id}"]`)
if(el) el.remove()

})

selectedNodes.clear()

drawLinks()

}

}

function renderNode(div,tech){

div.style.left=tech.x+"px"
div.style.top=tech.y+"px"
div.style.background=categories[tech.category] || "#ddd"

let catOptions=""

for(let c in categories){

catOptions+=`<option ${c==tech.category?"selected":""}>${c}</option>`

}

let eventOptions=""

events.forEach(ev=>{

let sel=tech.events.includes(ev)?"selected":""

eventOptions+=`<option ${sel}>${ev}</option>`

})

div.innerHTML=`

<div class="node-title" ondblclick="editTitle(this,'${tech.id}')">${tech.name}</div>

tier
<input style="width:40px" type="number"
value="${tech.tier}"
onchange="updateTier('${tech.id}',this.value)">

category
<select onchange="setCategory('${tech.id}',this.value)">
${catOptions}
</select>

events
<select multiple size="4" onmousedown="toggleEvent(event,'${tech.id}',this)">
${eventOptions}
</select>

`

}

function toggleEvent(e,id,select){

let option = e.target

if(option.tagName !== "OPTION") return

// 阻止瀏覽器預設選取行為
e.preventDefault()

// 手動切換
option.selected = !option.selected

let arr=[]

for(let o of select.options){
if(o.selected){
arr.push(o.value)
}
}

techs[id].events = arr

}

function editTitle(el,id){

let val=prompt("name",techs[id].name)

if(val){

techs[id].name=val
el.innerText=val

}

}

function setCategory(id,val){

techs[id].category=val
updateAllNodes()

}

function setEvents(id,select){

let arr=[]

for(let o of select.options){

if(o.selected){
arr.push(o.value)
}

}

techs[id].events=arr

}

function updateTier(id,val){

val=parseInt(val)

techs[id].tier=val
techs[id].x=val*200

let div=document.querySelector(`[data-id="${id}"]`)
div.style.left=techs[id].x+"px"

drawLinks()

}

function updateAllNodes(){

for(let id in techs){

let div=document.querySelector(`[data-id="${id}"]`)
renderNode(div,techs[id])

}

}

function toggleLink(a,b){

let i=links.findIndex(l=>l.from==a && l.to==b)

if(i>=0){

links.splice(i,1)

}else{

links.push({from:a,to:b})

}

drawLinks()

}

function drawLinks(){

svg.innerHTML = `
<defs>
<marker id="arrow"
markerWidth="10"
markerHeight="10"
refX="8"
refY="3"
orient="auto"
markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="black"></path>
</marker>
</defs>
`

links.forEach((l,i)=>{

let fromTech = techs[l.from]
let toTech   = techs[l.to]

if(!fromTech || !toTech) return

let start = l.from
let end   = l.to

// 箭頭指向高 tier
if(fromTech.tier > toTech.tier){
start = l.to
end   = l.from
}

let a=document.querySelector(`[data-id="${start}"]`)
let b=document.querySelector(`[data-id="${end}"]`)

if(!a || !b) return

let ax=a.offsetLeft + a.offsetWidth/2
let ay=a.offsetTop  + a.offsetHeight/2

let bx=b.offsetLeft + b.offsetWidth/2
let by=b.offsetTop  + b.offsetHeight/2

// 方向向量
let dx = bx - ax
let dy = by - ay

let len = Math.sqrt(dx*dx + dy*dy)

if(len===0) return

dx/=len
dy/=len

// 從節點邊緣開始
let startX = ax + dx * (a.offsetWidth/2)
let startY = ay + dy * (a.offsetHeight/2)

let endX = bx - dx * (b.offsetWidth/2)
let endY = by - dy * (b.offsetHeight/2)

let line=document.createElementNS("http://www.w3.org/2000/svg","line")

line.setAttribute("x1",startX)
line.setAttribute("y1",startY)
line.setAttribute("x2",endX)
line.setAttribute("y2",endY)

line.setAttribute("stroke","black")
line.setAttribute("stroke-width","2")
line.setAttribute("marker-end","url(#arrow)")

line.onclick=()=>{
links.splice(i,1)
drawLinks()
}

svg.appendChild(line)

})

}


function dragElement(el){

let pos1=0,pos2=0,pos3=0,pos4=0

el.onmousedown=dragMouseDown

function dragMouseDown(e){

pos3=e.clientX
pos4=e.clientY

document.onmouseup=closeDrag
document.onmousemove=elementDrag

}

function elementDrag(e){

pos1=pos3-e.clientX
pos2=pos4-e.clientY

pos3=e.clientX
pos4=e.clientY

el.style.top=(el.offsetTop-pos2)+"px"
el.style.left=(el.offsetLeft-pos1)+"px"

let id=el.dataset.id

techs[id].x=el.offsetLeft
techs[id].y=el.offsetTop

drawLinks()

}

function closeDrag(){

document.onmouseup=null
document.onmousemove=null

}

}

function autoArrange(){
  let tiers = {}

  // 分類節點到 tier
  for(let id in techs){
    let t = techs[id].tier || 1
    if(!tiers[t]) tiers[t]=[]
    tiers[t].push(techs[id])
  }

  // 設定每個 tier 的 Y 間距
  const tierHeight = 160
  const nodeWidth = 200

  for(let t in tiers){
    let nodes = tiers[t]
    nodes.forEach((tech, idx)=>{
      tech.y = idx * tierHeight
      tech.x = t * nodeWidth
      let div=document.querySelector(`[data-id="${tech.id}"]`)
      if(div){
        div.style.left = tech.x+"px"
        div.style.top = tech.y+"px"
      }
    })
  }

  drawLinks()
}

// 取代內部 onclick/onmousedown/oncontextmenu
document.querySelectorAll(".node").forEach(div=>{
  div.addEventListener("click", function(e){
    let tech = techs[div.dataset.id]
    if(!tech) return
    if(e.ctrlKey){
      if(selectedNodes.has(tech.id)){
        selectedNodes.delete(tech.id)
        div.style.outline=""
      }else{
        selectedNodes.add(tech.id)
        div.style.outline="3px solid red"
      }
      return
    }
    if(e.shiftKey){
      if(selected==null){
        selected=tech.id
      }else{
        toggleLink(selected,tech.id)
        selected=null
      }
    }
  })

  div.addEventListener("contextmenu", function(e){
    e.preventDefault()
    let tech = techs[div.dataset.id]
    if(!tech) return
    let targets=[tech.id]
    if(selectedNodes.size>0) targets=[...selectedNodes]
    if(!confirm("Delete "+targets.length+" tech(s)?")) return
    targets.forEach(id=>{
      delete techs[id]
      links=links.filter(l=>l.from!=id && l.to!=id)
      let el=document.querySelector(`[data-id="${id}"]`)
      if(el) el.remove()
    })
    selectedNodes.clear()
    drawLinks()
  })
})

function exportJSON(){

let data={techs,links,categories,events}

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="tech_tree.json"

a.click()

}

function importJSON(){

let input=document.createElement("input")
input.type="file"

input.onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=()=>{

let data=JSON.parse(reader.result)

techs=data.techs
links=data.links
categories=data.categories
events=data.events

document.querySelectorAll(".node").forEach(n=>n.remove())

for(let id in techs){

createNode(techs[id])

}

drawLinks()

}

reader.readAsText(file)

}

input.click()

}

</script>

</body>
</html>
