<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech Tree Editor</title>

<style>

body{
margin:0;
font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
overflow:hidden;
}

#toolbar{
background:#eee;
padding:6px;
display:flex;
gap:6px;
}

#viewport{
width:100vw;
height:calc(100vh - 42px);
overflow:hidden;
background:#f8f8f8;
position:relative;
cursor:grab;
}

#world{
position:absolute;
transform-origin:0 0;
}

#canvas{
position:absolute;
width:6000px;
height:6000px;
}

svg{
position:absolute;
width:6000px;
height:6000px;
pointer-events:none;
}

line{
pointer-events:stroke;
cursor:pointer;
}

.node{
position:absolute;
width:140px;
padding:6px;
border-radius:6px;
border:1px solid #333;
background:#ddd;
user-select:none;
cursor:move;
}

.node-title{
font-weight:bold;
}

.selected{
outline:3px solid red;
}

</style>
</head>

<body>

<div id="toolbar">

<button onclick="addTech()">新增科技</button>
<button onclick="addCategory()">新增類別</button>
<button onclick="addEvent()">新增Event</button>
<button onclick="autoLayout()">Auto Layout</button>
<button onclick="exportJSON()">匯出</button>
<button onclick="importJSON()">匯入</button>

</div>

<div id="viewport">

<div id="world">

<div id="canvas"></div>

<svg id="links"></svg>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const svg=document.getElementById("links")
const world=document.getElementById("world")
const viewport=document.getElementById("viewport")

let techs={}
let links=[]
let categories={general:"#cccccc"}
let events=[]

let selectedNodes=new Set()
let linkStart=null

let zoom=1
let panX=0
let panY=0

let undoStack=[]
let redoStack=[]

function pushState(){

undoStack.push(JSON.stringify({techs,links,categories,events}))

if(undoStack.length>100) undoStack.shift()

redoStack.length=0

}

function undo(){

if(undoStack.length==0) return

redoStack.push(JSON.stringify({techs,links,categories,events}))

let state=JSON.parse(undoStack.pop())

restoreState(state)

}

function redo(){

if(redoStack.length==0) return

undoStack.push(JSON.stringify({techs,links,categories,events}))

let state=JSON.parse(redoStack.pop())

restoreState(state)

}

function restoreState(s){

techs=s.techs
links=s.links
categories=s.categories
events=s.events

document.querySelectorAll(".node").forEach(n=>n.remove())

for(let id in techs){

createNode(techs[id])

}

drawLinks()

}

document.addEventListener("keydown",e=>{

if(e.ctrlKey && e.key==="z"){
e.preventDefault()
undo()
}

if(e.ctrlKey && e.key==="y"){
e.preventDefault()
redo()
}

})

function applyTransform(){

world.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`

}

viewport.onwheel=e=>{

e.preventDefault()

let scale=e.deltaY<0?1.1:0.9

zoom*=scale

applyTransform()

}

let panning=false
let panStartX=0
let panStartY=0

viewport.onmousedown=e=>{

if(e.target!==viewport) return

panning=true

viewport.style.cursor="grabbing"

panStartX=e.clientX-panX
panStartY=e.clientY-panY

}

document.onmouseup=()=>{

panning=false
viewport.style.cursor="grab"

}

document.onmousemove=e=>{

if(!panning) return

panX=e.clientX-panStartX
panY=e.clientY-panStartY

applyTransform()

}

function addTech(){

pushState()

let id="tech_"+Date.now()

let tech={
id,
name:"new tech",
tier:1,
category:"general",
events:[],
x:200,
y:200
}

techs[id]=tech

createNode(tech)

}

function addCategory(){

let name=prompt("category name")

if(!name) return

let color=prompt("color","#a0a0ff")

categories[name]=color

updateAllNodes()

}

function addEvent(){

let name=prompt("event")

if(!name) return

events.push(name)

updateAllNodes()

}

function createNode(tech){

let div=document.createElement("div")

div.className="node"

div.dataset.id=tech.id

canvas.appendChild(div)

renderNode(div,tech)

dragNode(div)

div.onclick=e=>{

if(e.ctrlKey || e.metaKey){

if(selectedNodes.has(tech.id)){
selectedNodes.delete(tech.id)
div.classList.remove("selected")
}else{
selectedNodes.add(tech.id)
div.classList.add("selected")
}

return

}

if(e.shiftKey){

if(linkStart==null){
linkStart=tech.id
}else{
toggleLink(linkStart,tech.id)
linkStart=null
}

}

}

div.oncontextmenu=e=>{

e.preventDefault()

pushState()

let targets=[tech.id]

if(selectedNodes.size>0){
targets=[...selectedNodes]
}

targets.forEach(id=>{

delete techs[id]

links=links.filter(l=>l.from!=id && l.to!=id)

let el=document.querySelector(`[data-id="${id}"]`)
if(el) el.remove()

})

selectedNodes.clear()

drawLinks()

}

}

function renderNode(div,tech){

div.style.left=tech.x+"px"
div.style.top=tech.y+"px"
div.style.background=categories[tech.category]||"#ddd"

let catOptions=""

for(let c in categories){

catOptions+=`<option ${c==tech.category?"selected":""}>${c}</option>`

}

let eventOptions=""

events.forEach(ev=>{

let sel=tech.events.includes(ev)?"selected":""

eventOptions+=`<option ${sel}>${ev}</option>`

})

div.innerHTML=`

<div class="node-title" ondblclick="editTitle('${tech.id}')">${tech.name}</div>

tier
<input type="number" value="${tech.tier}" style="width:40px"
onchange="updateTier('${tech.id}',this.value)">

category
<select onchange="setCategory('${tech.id}',this.value)">
${catOptions}
</select>

events
<select multiple size="4"
onmousedown="toggleEvent(event,'${tech.id}',this)">
${eventOptions}
</select>

`

}

function editTitle(id){

pushState()

let val=prompt("name",techs[id].name)

if(val){

techs[id].name=val

updateAllNodes()

}

}

function setCategory(id,val){

pushState()

techs[id].category=val

updateAllNodes()

}

function toggleEvent(e,id,select){

let option=e.target

if(option.tagName!=="OPTION") return

e.preventDefault()

option.selected=!option.selected

let arr=[]

for(let o of select.options){

if(o.selected) arr.push(o.value)

}

techs[id].events=arr

}

function updateTier(id,val){

pushState()

val=parseInt(val)

techs[id].tier=val

drawLinks()

}

function updateAllNodes(){

for(let id in techs){

let div=document.querySelector(`[data-id="${id}"]`)

renderNode(div,techs[id])

}

}

function toggleLink(a,b){

pushState()

let i=links.findIndex(l=>l.from==a && l.to==b)

if(i>=0) links.splice(i,1)

else links.push({from:a,to:b})

drawLinks()

}

function drawLinks(){

svg.innerHTML = `
<defs>
<marker id="arrow"
markerWidth="10"
markerHeight="10"
refX="9"
refY="3"
orient="auto"
markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="black"></path>
</marker>
</defs>
`

links.forEach((l,i)=>{

let fromTech=techs[l.from]
let toTech=techs[l.to]

if(!fromTech || !toTech) return

let start=l.from
let end=l.to

let a=document.querySelector(`[data-id="${start}"]`)
let b=document.querySelector(`[data-id="${end}"]`)

if(!a||!b) return

let ra=a.getBoundingClientRect()
let rb=b.getBoundingClientRect()
let rc=canvas.getBoundingClientRect()

let ax=ra.left-rc.left+ra.width/2
let ay=ra.top-rc.top+ra.height/2

let bx=rb.left-rc.left+rb.width/2
let by=rb.top-rc.top+rb.height/2

let dx=bx-ax
let dy=by-ay

let len=Math.sqrt(dx*dx+dy*dy)

if(len===0) return

dx/=len
dy/=len

// 從節點邊界開始
let startX=ax+dx*(ra.width/2)
let startY=ay+dy*(ra.height/2)

let endX=bx-dx*(rb.width/2)
let endY=by-dy*(rb.height/2)

let line=document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
)

line.setAttribute("x1",startX)
line.setAttribute("y1",startY)
line.setAttribute("x2",endX)
line.setAttribute("y2",endY)

line.setAttribute("stroke","black")
line.setAttribute("stroke-width","2")
line.setAttribute("marker-end","url(#arrow)")

line.style.pointerEvents="stroke"

line.onclick=()=>{

pushState()

links.splice(i,1)

drawLinks()

}

svg.appendChild(line)

})

}

function dragNode(el){

let id=el.dataset.id

let dragging=false

let startX,startY

el.onmousedown=e=>{

dragging=true

startX=e.clientX-techs[id].x
startY=e.clientY-techs[id].y

}

document.onmousemove=e=>{

if(!dragging) return

techs[id].x=(e.clientX-startX)/zoom
techs[id].y=(e.clientY-startY)/zoom

el.style.left=techs[id].x+"px"
el.style.top=techs[id].y+"px"

drawLinks()

}

document.onmouseup=()=>{

dragging=false

}

}

function autoLayout(){

pushState()

let tiers={}

for(let id in techs){

let t=techs[id].tier

if(!tiers[t]) tiers[t]=[]

tiers[t].push(techs[id])

}

let spacingX=260
let spacingY=140

Object.keys(tiers).forEach(t=>{

let list=tiers[t]

list.forEach((tech,i)=>{

tech.x=t*spacingX
tech.y=i*spacingY+200

})

})

updateAllNodes()

drawLinks()

}

function exportJSON(){

let data={techs,links,categories,events}

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="tech_tree.json"

a.click()

}

function importJSON(){

let input=document.createElement("input")

input.type="file"

input.onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=()=>{

let data=JSON.parse(reader.result)

techs=data.techs||{}
links=data.links||[]
categories=data.categories||{general:"#ccc"}
events=data.events||[]

restoreState({techs,links,categories,events})

}

reader.readAsText(file)

}

input.click()

}

</script>

</body>
</html>
